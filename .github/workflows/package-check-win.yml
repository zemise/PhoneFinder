name: package-check-win

on:
  pull_request:
  push:
    branches: [main, develop, feat/**]

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt 5.15.2 (MSVC) and NSIS
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt
          choco install nsis -y

      - name: Add Qt bin to PATH
        shell: pwsh
        run: |
          "C:\Qt\5.15.2\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package (no publish)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          cmake -S . -B build-win-qt -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="C:\Qt\5.15.2\msvc2019_64"
          cmake --build build-win-qt --config Release --target phonefinder_qt

          $stageDir = Join-Path $PWD "build-win-qt\stage"
          $distDir = Join-Path $PWD "dist"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          Copy-Item ".\build-win-qt\Release\PhoneFinder.exe" (Join-Path $stageDir "PhoneFinder.exe") -Force
          if (Test-Path ".\resources\windows\icon.ico") {
            Copy-Item ".\resources\windows\icon.ico" (Join-Path $stageDir "icon.ico") -Force
          }
          if (Test-Path ".\resources\trayicon.png") {
            Copy-Item ".\resources\trayicon.png" (Join-Path $stageDir "trayicon.png") -Force
          }

          windeployqt --release (Join-Path $stageDir "PhoneFinder.exe")
          makensis "/DAPP_STAGE_DIR=$stageDir" "/DAPP_OUTFILE=$(Join-Path $distDir 'PhoneFinder-installer.exe')" ".\packaging\qt_installer.nsi"

      - name: Verify installer exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist\PhoneFinder-installer.exe")) {
            throw "Installer not found: dist\PhoneFinder-installer.exe"
          }

      - name: Upload artifact only
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFinder-installer-win
          path: dist/PhoneFinder-installer.exe
          retention-days: 5
